services:
  humoniod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: humoniod-ai
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ${MODEL_VOLUME_PATH:-./models}:/models:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=4)"]
      interval: 30s
      timeout: 6s
      retries: 5
      start_period: 45s
